services:
  postgres:
    image: postgres:17
    restart: always
    container_name: realtime-chat-db
    ports:
      - "5430:5432"
    environment:
      POSTGRES_USER: postgredb
      POSTGRES_PASSWORD: postgredb
      POSTGRES_DB: realtime_chat
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    container_name: realtime-chat-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
